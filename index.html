  <style type="text/css">
    @font-face {
      font-family: main;
      font-display: swap;
      src: url(https://tpcdn.b-cdn.net/gh/CatHead132/fpstetrisoffline@latest/assets/1UB-Qs0.woff2) format('woff2'), url(https://tpcdn.b-cdn.net/gh/CatHead132/fpstetrisoffline@latest/assets/Rzw3fep.woff) format('woff')
    }

    #game,
    #splash,
    body,
    html {
      height: 100%;
      font-size: 24px
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: main, sans-serif
    }

    #splash,
    noscript {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 100%;
      background-color: #000;
      color: #fff;
      line-height: 1.5em
    }

    #splash>* {
      display: block
    }
  </style>
</head>

<body>
  <div id="game"></div>
  <div id="splash"><img class="splash-icon" src="https://tpcdn.b-cdn.net/gh/CatHead132/fpstetrisoffline@latest/assets/1T5DmAh.png" title="First-Person Tetris"> <span class="loading-label">Loading...</span> <span class="loading-percent"></span></div><noscript>
    <div id="noscript">Enable Javascript to play this game</div>
  </noscript>
  <script type="text/javascript">
    (async () => {
      const BASE = 'https://tpcdn.b-cdn.net/gh/CatHead132/fpstetrisoffline@latest/';
      const scripts = [
        BASE + 'runtime/065fcf7.js',
        BASE + 'runtime/d87ede5.js',
        BASE + 'runtime/5028f7e.js',
      ];

      for (const url of scripts) {
        const res = await fetch(url);
        let code = await res.text();
        code = code.replace(/(?<!['"(=])(assets\/)/g, BASE + 'assets/');
        code = code.replace(/["']assets\//g, m => m[0] + BASE + 'assets/');
        code = code.replace(/["']runtime\//g, m => m[0] + BASE + 'runtime/');
        const blob = new Blob([code], { type: 'application/javascript' });
        const blobUrl = URL.createObjectURL(blob);
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = blobUrl;
          s.onload = () => { URL.revokeObjectURL(blobUrl); resolve(); };
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }
    })();
  </script>
</body>

</html>
